[tool.briefcase]
project_name = "Belinda AI"
bundle = "id.studio234"
version = "1.0.0-21"
display_name = "Belinda AI"
formal_name = "Belinda AI"
description = "WhatsApp Bot Belinda AI"
long_description = "WhatsApp Bot Belinda AI - Intelligent assistant with GUI setup and cross-platform support"
author = "Danta"
author_email = "danta@studio234.id"
url = "https://github.com/Danta23/Belinda_AI"
license.text = "MIT"

[tool.briefcase.app.belinda-ai]
executable = "belinda-ai"
sources = ["src/belinda_ai"]
requires = ["python-dotenv"]

[tool.briefcase.app.belinda-ai.macOS]
universal_build = true
requires = ["PyQt5", "qtawesome", "python-dotenv", "QtPy"]

[tool.briefcase.app.belinda-ai.windows]
requires = ["PyQt5", "qtawesome", "python-dotenv", "QtPy"]

[tool.briefcase.app.belinda-ai.linux]
requires = ["PyQt5", "qtawesome", "python-dotenv", "QtPy"]

[tool.briefcase.app.belinda-ai.android]
# Use Native Toga for Android (Fixed compatibility)
app_module = "belinda_ai.android_app"
requires = ["toga-android", "python-dotenv"]
