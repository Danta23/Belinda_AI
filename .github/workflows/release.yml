name: Multi-Platform Native Build
permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 qtawesome python-dotenv
      - name: Build EXE
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "Belinda-AI-Installer-Win" --add-data "src/belinda_ai/installer_styles.py;." --add-data "src/belinda_ai/installer_settings_manager.py;." --add-data "src/belinda_ai/installer_translations.py;." --clean src/belinda_ai/installer_app.py
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/Belinda-AI-Installer-Win.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 qtawesome python-dotenv
      - name: Build App Bundle
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "Belinda-AI-Installer-Mac" --add-data "src/belinda_ai/installer_styles.py:." --add-data "src/belinda_ai/installer_settings_manager.py:." --add-data "src/belinda_ai/installer_translations.py:." --clean src/belinda_ai/installer_app.py
      - name: Create DMG
        run: |
          hdiutil create -volname "Belinda AI Installer" -srcfolder dist/ -ov -format UDZO Belinda-AI-Installer-Mac.dmg
      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: Belinda-AI-Installer-Mac.dmg

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install briefcase
      - name: Build APK
        run: |
          briefcase create android --no-input
          briefcase build android --no-input
          briefcase package android --no-input
      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: "build/belinda-ai/android/gradle/app/build/outputs/apk/debug/*.apk"

  release:
    needs: [build-windows, build-macos, build-android]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-assets
      - name: Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            all-assets/windows-exe/Belinda-AI-Installer-Win.exe
            all-assets/macos-dmg/Belinda-AI-Installer-Mac.dmg
            all-assets/android-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
